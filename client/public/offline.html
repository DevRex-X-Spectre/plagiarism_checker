<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Project Archive</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #f6f6f8;
        color: #011821;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }
      .container {
        max-width: 480px;
      }
      h1 {
        font-size: 28px;
        font-weight: 300;
        margin-bottom: 12px;
      }
      p {
        font-size: 16px;
        color: #7c7f88;
        margin-bottom: 32px;
        line-height: 1.5;
      }
      button {
        background: #111a4a;
        color: #fff;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You're offline</h1>
      <p>The Project Archive requires an internet connection to load. Please check your connection and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
